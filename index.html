<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SNAKE 2000</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Mono&display=swap');

  :root{
    --chrome1:#e8f0ff;
    --chrome2:#8fa5c4;
    --hotpink:#ff2fa0;
    --cyber-blue:#00e5ff;
    --acid:#c6ff00;
    --deep:#12102a;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 20% 20%, #3a2f6e 0%, transparent 45%),
      radial-gradient(circle at 80% 80%, #1a3a5c 0%, transparent 45%),
      linear-gradient(160deg, var(--deep), #05040f);
    font-family:'Space Mono', monospace;
    color:var(--chrome1);
    overflow:hidden;
  }

  .rig{
    position:relative;
    padding:28px;
    border-radius:28px;
    background:linear-gradient(145deg,#cdd8ee,#7f93b8 40%,#3f4c6b);
    box-shadow:
      0 0 0 2px #fff8,
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 2px 4px rgba(255,255,255,0.8),
      inset 0 -6px 12px rgba(0,0,0,0.35);
  }

  h1{
    margin:0 0 4px;
    text-align:center;
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size:28px;
    letter-spacing:3px;
    background:linear-gradient(90deg, var(--hotpink), var(--cyber-blue), var(--acid));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 20px rgba(0,229,255,0.3);
  }

  .tag{
    text-align:center;
    font-size:10px;
    letter-spacing:4px;
    color:#4a5a80;
    margin-bottom:14px;
  }

  .screen-frame{
    border-radius:14px;
    padding:10px;
    background:linear-gradient(160deg,#0a0a18,#1c1c30);
    box-shadow:inset 0 0 0 2px #000, inset 0 4px 14px rgba(0,0,0,0.8);
  }

  canvas{
    display:block;
    border-radius:6px;
    background:
      linear-gradient(rgba(198,255,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(198,255,0,0.04) 1px, transparent 1px),
      #060613;
    background-size:20px 20px, 20px 20px, cover;
    box-shadow:0 0 30px rgba(0,229,255,0.15) inset;
  }

  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:12px 4px 0;
    font-family:'Orbitron', sans-serif;
    font-size:13px;
    letter-spacing:1px;
  }

  .hud .score{ color:var(--acid); text-shadow:0 0 8px rgba(198,255,0,0.6); }
  .hud .best{ color:var(--cyber-blue); text-shadow:0 0 8px rgba(0,229,255,0.6); }

  .controls{
    margin-top:16px;
    display:flex;
    justify-content:center;
    gap:10px;
  }

  button{
    font-family:'Orbitron', sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:2px;
    padding:10px 18px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    color:#12102a;
    background:linear-gradient(145deg, var(--chrome1), var(--chrome2));
    box-shadow:0 4px 0 #57648a, 0 6px 10px rgba(0,0,0,0.4);
    transition:transform 0.08s ease;
  }
  button:active{ transform:translateY(3px); box-shadow:0 1px 0 #57648a; }

  .msg{
    text-align:center;
    margin-top:10px;
    font-size:11px;
    color:#7f8fb8;
    letter-spacing:1px;
    min-height:14px;
  }

  .msg.alert{ color:var(--hotpink); text-shadow:0 0 8px rgba(255,47,160,0.6); }

  /* on-screen D-pad, shown only on touch devices */
  .dpad{
    display:none;
    margin-top:16px;
    grid-template-columns:repeat(3, 52px);
    grid-template-rows:repeat(3, 52px);
    justify-content:center;
    gap:6px;
  }

  .dpad button{
    padding:0;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .dpad .up{ grid-column:2; grid-row:1; }
  .dpad .left{ grid-column:1; grid-row:2; }
  .dpad .right{ grid-column:3; grid-row:2; }
  .dpad .down{ grid-column:2; grid-row:3; }

  @media (hover:none) and (pointer:coarse){
    .dpad{ display:grid; }
    .rig{ padding:18px; }
  }

  @media (max-width:420px){
    canvas{ width:88vw; height:88vw; max-width:340px; max-height:340px; }
  }
</style>
</head>
<body>

<div class="rig">
  <h1>◆ SNAKE 2000 ◆</h1>
  <div class="tag">MILLENNIUM EDITION</div>

  <div class="screen-frame">
    <canvas id="game" width="360" height="360"></canvas>
  </div>

  <div class="hud">
    <span class="score">SCORE: <span id="score">0</span></span>
    <span class="best">BEST: <span id="best">0</span></span>
  </div>

  <div class="controls">
    <button id="startBtn">START</button>
    <button id="pauseBtn">PAUSE</button>
  </div>

  <div class="msg" id="msg">Use arrow keys / WASD to move</div>

  <div class="dpad">
    <button class="up" data-dir="up">▲</button>
    <button class="left" data-dir="left">◀</button>
    <button class="right" data-dir="right">▶</button>
    <button class="down" data-dir="down">▼</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const size = 20;                // grid cell size
const cols = canvas.width / size;
const rows = canvas.height / size;

let snake, direction, nextDirection, food, score, best, loop, running, paused;

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');

best = Number(localStorage.getItem('y2kSnakeBest')) || 0;
bestEl.textContent = best;

function init(){
  snake = [{x:9,y:9},{x:8,y:9},{x:7,y:9}];
  direction = {x:1,y:0};
  nextDirection = {x:1,y:0};
  score = 0;
  scoreEl.textContent = score;
  placeFood();
  running = true;
  paused = false;
  msgEl.textContent = 'Use arrow keys / WASD to move';
  msgEl.classList.remove('alert');
}

function placeFood(){
  do{
    food = { x: Math.floor(Math.random()*cols), y: Math.floor(Math.random()*rows) };
  } while(snake.some(s => s.x===food.x && s.y===food.y));
}

function tick(){
  if(!running || paused) return;
  direction = nextDirection;

  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // wall collision
  if(head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows || hitsSelf(head)){
    gameOver();
    return;
  }

  snake.unshift(head);

  if(head.x === food.x && head.y === food.y){
    score += 10;
    scoreEl.textContent = score;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function hitsSelf(head){
  return snake.some(s => s.x === head.x && s.y === head.y);
}

function gameOver(){
  running = false;
  clearInterval(loop);
  if(score > best){
    best = score;
    localStorage.setItem('y2kSnakeBest', best);
    bestEl.textContent = best;
  }
  msgEl.textContent = 'GAME OVER — press START to retry';
  msgEl.classList.add('alert');
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // food — chrome orb
  const fx = food.x*size + size/2, fy = food.y*size + size/2;
  const grad = ctx.createRadialGradient(fx-3, fy-3, 1, fx, fy, size/2);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.4, '#ff2fa0');
  grad.addColorStop(1, '#7a0048');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(fx, fy, size/2 - 2, 0, Math.PI*2);
  ctx.fill();

  // snake — gradient chrome segments
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const c1 = lerpColor([0,229,255], [198,255,0], t);
    ctx.fillStyle = `rgb(${c1[0]},${c1[1]},${c1[2]})`;
    ctx.shadowColor = i===0 ? '#00e5ff' : 'transparent';
    ctx.shadowBlur = i===0 ? 12 : 0;
    roundRect(seg.x*size+1, seg.y*size+1, size-2, size-2, 5);
  });
  ctx.shadowBlur = 0;
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  ctx.fill();
}

function lerpColor(a,b,t){
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t)
  ];
}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  const map = {
    'arrowup':{x:0,y:-1}, 'w':{x:0,y:-1},
    'arrowdown':{x:0,y:1}, 's':{x:0,y:1},
    'arrowleft':{x:-1,y:0}, 'a':{x:-1,y:0},
    'arrowright':{x:1,y:0}, 'd':{x:1,y:0}
  };
  const d = map[key];
  if(!d) return;
  e.preventDefault();
  // prevent reversing directly into self
  if(d.x === -direction.x && d.y === -direction.y) return;
  nextDirection = d;
});

// shared direction-setter used by keyboard, D-pad, and swipe
function setDirection(name){
  const map = {
    up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}
  };
  const d = map[name];
  if(!d) return;
  if(d.x === -direction.x && d.y === -direction.y) return;
  nextDirection = d;
}

// on-screen D-pad
document.querySelectorAll('.dpad button').forEach(btn => {
  btn.addEventListener('click', () => setDirection(btn.dataset.dir));
});

// swipe controls on the canvas itself
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  const t = e.changedTouches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, {passive:true});

canvas.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if(Math.max(Math.abs(dx), Math.abs(dy)) < 20) return; // ignore taps
  if(Math.abs(dx) > Math.abs(dy)){
    setDirection(dx > 0 ? 'right' : 'left');
  } else {
    setDirection(dy > 0 ? 'down' : 'up');
  }
}, {passive:true});

document.getElementById('startBtn').addEventListener('click', () => {
  clearInterval(loop);
  init();
  draw();
  loop = setInterval(tick, 110);
});

document.getElementById('pauseBtn').addEventListener('click', () => {
  if(!running) return;
  paused = !paused;
  msgEl.textContent = paused ? 'PAUSED' : 'Use arrow keys / WASD to move';
  msgEl.classList.toggle('alert', paused);
});

// initial draw before first start
init();
draw();
running = false;
</script>

</body>
</html>
